<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <title>Ödünç İşlemleri - Kütüphane</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <span class="logo-icon">📚</span>
            <div><div class="logo-title">Bibliotheca</div><div class="logo-sub">Yönetim Sistemi</div></div>
        </div>
        <nav class="nav">
            <a href="index.html" class="nav-item"><span class="nav-icon">◈</span> Dashboard</a>
            <a href="books.html" class="nav-item"><span class="nav-icon">◉</span> Kitaplar</a>
            <a href="members.html" class="nav-item"><span class="nav-icon">◎</span> Üyeler</a>
            <a href="loans.html" class="nav-item active"><span class="nav-icon">◐</span> Ödünç İşlemleri</a>
        </nav>
    </aside>

    <main class="main">
        <header class="topbar">
            <div class="page-title">Ödünç İşlemleri</div>
            <div class="topbar-right">
                <div class="search-wrap">
                    <input type="text" id="searchInput" placeholder="İşlem Ara..." class="search-input" />
                </div>
                <button class="btn-primary" onclick="openAddLoan()">+ Ödünç Ver</button>
            </div>
        </header>

        <div class="content">
            <div class="table-wrap">
                <table class="data-table" id="loansTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Üye</th>
                            <th>Kitap</th>
                            <th>Veriliş</th>
                            <th>Teslim</th>
                            <th>Durum</th>
                            <th>İşlem</th>
                        </tr>
                    </thead>
                    <tbody id="loansBody">
                        <tr><td colspan="7" class="loading-cell">Yükleniyor...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" id="modal">
            <div class="modal-header">
                <div class="modal-title">Ödünç Ver</div>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button class="btn-ghost" onclick="closeModal()">İptal</button>
                <button class="btn-primary" id="modalSaveBtn" onclick="saveLoan()">Kaydet</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/loans.js"></script>
</body>
</html>
