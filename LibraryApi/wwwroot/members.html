<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <title>Üyeler - Kütüphane</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <span class="logo-icon">📚</span>
            <div><div class="logo-title">Bibliotheca</div><div class="logo-sub">Yönetim Sistemi</div></div>
        </div>
        <nav class="nav">
            <a href="index.html" class="nav-item"><span class="nav-icon">◈</span> Dashboard</a>
            <a href="books.html" class="nav-item"><span class="nav-icon">◉</span> Kitaplar</a>
            <a href="members.html" class="nav-item active"><span class="nav-icon">◎</span> Üyeler</a>
            <a href="loans.html" class="nav-item"><span class="nav-icon">◐</span> Ödünç İşlemleri</a>
        </nav>
    </aside>

    <main class="main">
        <header class="topbar">
            <div class="page-title">Üyeler</div>
            <div class="topbar-right">
                <div class="search-wrap">
                    <input type="text" id="searchInput" placeholder="Üye Ara..." class="search-input" />
                </div>
                <button class="btn-primary" onclick="openAddMember()">+ Yeni Üye</button>
            </div>
        </header>

        <div class="content">
            <div class="table-wrap">
                <table class="data-table" id="membersTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Ad</th>
                            <th>Soyad</th>
                            <th>Telefon</th>
                            <th>E-posta</th>
                            <th>Kayıt Tarihi</th>
                            <th>İşlem</th>
                        </tr>
                    </thead>
                    <tbody id="membersBody">
                        <tr><td colspan="7" class="loading-cell">Yükleniyor...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" id="modal">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">...</div>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button class="btn-ghost" onclick="closeModal()">İptal</button>
                <button class="btn-primary" id="modalSaveBtn" onclick="saveMember()">Kaydet</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/members.js"></script>
</body>
</html>
